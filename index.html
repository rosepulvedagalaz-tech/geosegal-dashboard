<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Operacional - Flota</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Dashboard Operacional</h1>

<div class="kpi-container">

<div class="kpi">
<h3>Disponibilidad Flota</h3>
<p id="disponibilidad">--%</p>
</div>

<div class="kpi">
<h3>Cumplimiento Servicio</h3>
<p id="cumplimiento">--%</p>
</div>

<div class="kpi">
<h3>Revisión Técnica</h3>
<p id="revision">--%</p>
</div>

</div>

<div class="charts">

<canvas id="fallasChart"></canvas>

</div>

<script src="dashboard.js"></script>

</body>
</html>
